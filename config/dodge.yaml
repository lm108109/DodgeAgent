behaviors:
  Dodge:
    trainer_type: ppo

    hyperparameters:
      batch_size: 512
      buffer_size: 10000
      learning_rate: 3e-4 #typically between 1e-5 and 1e-3
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3

    network_settings:
      normalize: true #it there is normalization it is not needed
      hidden_units: 256
      num_layers: 3

    reward_signals:
      extrinsic:
        gamma: 0.9
        strength: 1.0

    max_steps: 1000000 # typically between 5e5- 1e7
    time_horizon: 64 # typically between 32 and 2048, depending on the complexity of the environment and the batch size
    summary_freq: 50000
    threaded: true
torch_settings:
  device: cpu
